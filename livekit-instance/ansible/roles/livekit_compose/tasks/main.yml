---
- name: Render docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ livekit_sip_dir }}/docker-compose.yml"
    mode: '0644'

- name: Start LiveKit SIP stack
  community.docker.docker_compose_v2:
    project_src: "{{ livekit_sip_dir }}"
    state: present
    pull: policy
