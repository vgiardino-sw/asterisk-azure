---
- name: Validate required LiveKit vars
  ansible.builtin.assert:
    that:
      - livekit_fqdn is defined
      - livekit_fqdn | trim != ''
      - livekit_fqdn != 'CHANGE_ME_FQDN'
      - letsencrypt_email is defined
      - letsencrypt_email | trim != ''
      - letsencrypt_email != 'CHANGE_ME_EMAIL'
      - livekit_api_key is defined
      - livekit_api_key | trim != ''
      - livekit_api_secret is defined
      - livekit_api_secret | trim != ''
      - ws_url is defined
      - ws_url | trim != ''
    fail_msg: "Missing required LiveKit vars in ansible/group_vars/livekit-sip.yml"

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - docker.io
      - docker-compose-v2
      - certbot
    state: present
    update_cache: true

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add ansible user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user | default('azureuser') }}"
    groups: docker
    append: true

- name: Ensure LiveKit SIP deploy directory exists
  ansible.builtin.file:
    path: "{{ livekit_sip_dir }}"
    state: directory
    mode: '0755'

- name: Ensure certbot renewal hook dir exists
  ansible.builtin.file:
    path: /etc/letsencrypt/renewal-hooks/deploy
    state: directory
    mode: '0755'

- name: Check UFW status
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: false

- name: Allow LiveKit API port in UFW when active
  community.general.ufw:
    rule: allow
    port: "{{ livekit_server_port }}"
    proto: tcp
  when: "ufw_status.rc == 0 and ('Status: active' in ufw_status.stdout)"
