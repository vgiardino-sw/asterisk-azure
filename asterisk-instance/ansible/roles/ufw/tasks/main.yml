---
- name: Configure UFW defaults
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Configure UFW outgoing default
  community.general.ufw:
    state: enabled
    policy: allow
    direction: outgoing

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP challenge when enabled
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp
  when: enable_http_challenge | bool

- name: Allow SIP TLS
  community.general.ufw:
    rule: allow
    port: "{{ sip_tls_port }}"
    proto: tcp

- name: Allow RTP UDP range
  community.general.ufw:
    rule: allow
    port: "{{ rtp_udp_start }}:{{ rtp_udp_end }}"
    proto: udp
